<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title | default: "BibleThought" }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  {% unless page.url == '/' or page.url == '/index.html' %}
  <a href="{{ '/' | relative_url }}" id="home-link">← 主页</a>
  {% endunless %}

  <div id="font-bar">
    <button onclick="setFont('small')"  id="btn-small">小</button>
    <button onclick="setFont('medium')" id="btn-medium">中</button>
    <button onclick="setFont('large')"  id="btn-large">大</button>
    <button onclick="toggleTTS()" id="btn-tts">朗读</button>
    <button onclick="adjustSpeed(-1)" id="btn-slower">慢</button>
    <button onclick="adjustSpeed(1)"  id="btn-faster">快</button>
    <span id="tts-speed" style="font-size:12px;color:#888;line-height:28px;padding:0 2px;">1×</span>
  </div>

  <div class="copy-tip" id="copy-tip">链接已复制</div>

  <div id="main-content">
  {{ content }}
  </div>

  <script>
    // Convert .md links to .html for GitHub Pages
    document.querySelectorAll('a[href]').forEach(function(a) {
      var href = a.getAttribute('href');
      if (href && href.endsWith('.md')) {
        a.setAttribute('href', href.slice(0, -3) + '.html');
      }
    });

    // Anchor links for headings
    document.querySelectorAll('h2, h3').forEach(function(h) {
      var id = h.id;
      if (!id) return;
      var a = document.createElement('a');
      a.href = '#' + id;
      a.className = 'anchor-link';
      a.textContent = '#';
      a.onclick = function(e) {
        e.preventDefault();
        var url = location.href.split('#')[0] + '#' + id;
        navigator.clipboard.writeText(url).then(function() {
          var tip = document.getElementById('copy-tip');
          tip.style.display = 'block';
          setTimeout(function() { tip.style.display = 'none'; }, 1500);
        });
        history.pushState(null, '', '#' + id);
      };
      h.appendChild(a);
    });

    function setFont(size) {
      document.body.className = 'font-' + size;
      localStorage.setItem('fontSize', size);
      ['small','medium','large'].forEach(function(s) {
        document.getElementById('btn-' + s).classList.toggle('active', s === size);
      });
    }
    var defaultSize = window.innerWidth >= 768 ? 'large' : 'medium';
    var saved = localStorage.getItem('fontSize') || defaultSize;
    setFont(saved);

    // TTS
    var ttsState = 'idle';
    var ttsText = '';
    var ttsOffset = 0;
    var ttsCharIdx = 0;
    var speedPresets = [0.6, 0.8, 1.0, 1.2, 1.5, 1.8, 2.0];
    var speedLabels  = ['0.6×','0.8×','1×','1.2×','1.5×','1.8×','2×'];
    var speedIndex = 2;

    function startTTS(fromChar) {
      var btn = document.getElementById('btn-tts');
      if (!ttsText) ttsText = (document.getElementById('main-content') || document.body).innerText;
      fromChar = fromChar || 0;
      ttsOffset = fromChar;
      window.speechSynthesis.cancel();
      var utt = new SpeechSynthesisUtterance(ttsText.slice(fromChar));
      utt.lang = 'zh-CN';
      utt.rate = speedPresets[speedIndex];
      utt.onboundary = function(e) { ttsCharIdx = ttsOffset + e.charIndex; };
      utt.onend = function() {
        ttsState = 'idle'; ttsText = ''; ttsCharIdx = 0;
        btn.textContent = '朗读'; btn.classList.remove('active');
      };
      utt.onerror = function() {
        ttsState = 'idle';
        btn.textContent = '朗读'; btn.classList.remove('active');
      };
      window.speechSynthesis.speak(utt);
      ttsState = 'playing';
      btn.textContent = '暂停'; btn.classList.add('active');
    }

    function toggleTTS() {
      if (!('speechSynthesis' in window)) { alert('您的浏览器不支持语音朗读'); return; }
      if (ttsState === 'idle') {
        ttsText = ''; ttsCharIdx = 0;
        startTTS(0);
      } else if (ttsState === 'playing') {
        window.speechSynthesis.pause();
        ttsState = 'paused';
        document.getElementById('btn-tts').textContent = '继续';
      } else {
        window.speechSynthesis.resume();
        ttsState = 'playing';
        document.getElementById('btn-tts').textContent = '暂停';
      }
    }

    function adjustSpeed(dir) {
      speedIndex = Math.max(0, Math.min(speedPresets.length - 1, speedIndex + dir));
      document.getElementById('tts-speed').textContent = speedLabels[speedIndex];
      if (ttsState !== 'idle') startTTS(ttsCharIdx);
    }

    window.addEventListener('beforeunload', function() { window.speechSynthesis.cancel(); });
  </script>
</body>
</html>
